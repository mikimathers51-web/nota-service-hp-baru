name: Build Android Debug APK Capacitor 6

on:
  workflow_dispatch:
    inputs:
      build_notes:
        description: 'Catatan build'
        required: false
        type: string
        default: 'Build Capacitor 6'
  
  push:
    branches: [main, master]

jobs:
  build-android-debug:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        run: |
          mkdir -p ~/.gradle
          echo "org.gradle.jvmargs=-Xmx4096m -Dfile.encoding=UTF-8" >> ~/.gradle/gradle.properties
          echo "org.gradle.daemon=false" >> ~/.gradle/gradle.properties
          echo "org.gradle.parallel=true" >> ~/.gradle/gradle.properties

      - name: Create package.json
        run: |
          cat > package.json << 'ENDOFFILE'
          {
            "name": "nota-service-hp",
            "version": "1.0.0",
            "description": "Nota Service HP - Capacitor 6",
            "main": "index.html",
            "scripts": {
              "build": "mkdir -p www && cp index.html www/index.html",
              "cap:sync": "npx cap sync android",
              "build:debug": "npm run build && npx cap sync android && cd android && ./gradlew assembleDebug"
            },
            "dependencies": {
              "@capacitor/android": "^6.1.2",
              "@capacitor/core": "^6.1.2",
              "@capacitor/camera": "^6.0.2",
              "@capacitor/filesystem": "^6.0.1",
              "@capacitor/share": "^6.0.2",
              "@capacitor/splash-screen": "^6.0.3",
              "@capacitor/status-bar": "^6.0.1",
              "@capacitor-community/contacts": "^6.0.0",
              "@capacitor-community/bluetooth-le": "^6.0.0"
            },
            "devDependencies": {
              "@capacitor/cli": "^6.1.2"
            }
          }
          ENDOFFILE

      - name: Install dependencies
        run: |
          npm install
          npm install -g @capacitor/cli@^6.1.2

      - name: Prepare www directory and PWA files
        run: |
          mkdir -p www
          
          if [ -f "index.html" ]; then
            echo "index.html found in root"
          else
            echo "index.html not found in root directory"
            ls -la
            exit 1
          fi

          # Generate manifest.json
          echo '{
            "name": "Nota Service HP - Professional",
            "short_name": "ServiceHP",
            "description": "Sistem Manajemen Service HP Profesional",
            "start_url": "/",
            "display": "standalone",
            "background_color": "#667eea",
            "theme_color": "#667eea",
            "orientation": "portrait",
            "scope": "/",
            "categories": ["business", "productivity"],
            "icons": [
              {
                "src": "data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 192 192%22%3E%3Crect fill=%22%23667eea%22 width=%22192%22 height=%22192%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 dominant-baseline=%22middle%22 text-anchor=%22middle%22 font-size=%22100%22%3E%F0%9F%93%B1%3C/text%3E%3C/svg%3E",
                "sizes": "192x192",
                "type": "image/svg+xml",
                "purpose": "any maskable"
              },
              {
                "src": "data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 512 512%22%3E%3Crect fill=%22%23667eea%22 width=%22512%22 height=%22512%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 dominant-baseline=%22middle%22 text-anchor=%22middle%22 font-size=%22250%22%3E%F0%9F%93%B1%3C/text%3E%3C/svg%3E",
                "sizes": "512x512",
                "type": "image/svg+xml",
                "purpose": "any maskable"
              }
            ]
          }' > www/manifest.json

          # Generate service-worker.js
          cat > www/service-worker.js << 'ENDOFFILE'
          const CACHE_NAME = 'nota-service-hp-v1';
          const STATIC_ASSETS = ['/', '/index.html'];

          self.addEventListener('install', (event) => {
            event.waitUntil(
              caches.open(CACHE_NAME).then((cache) => {
                return cache.addAll(STATIC_ASSETS);
              }).then(() => self.skipWaiting())
            );
          });

          self.addEventListener('activate', (event) => {
            event.waitUntil(
              caches.keys().then((cacheNames) => {
                return Promise.all(
                  cacheNames.map((cacheName) => {
                    if (cacheName !== CACHE_NAME) {
                      return caches.delete(cacheName);
                    }
                  })
                );
              }).then(() => self.clients.claim())
            );
          });

          self.addEventListener('fetch', (event) => {
            event.respondWith(
              caches.match(event.request).then((cached) => {
                if (cached) return cached;
                return fetch(event.request).then((response) => {
                  if (!response || response.status !== 200 || event.request.method !== 'GET') {
                    return response;
                  }
                  if (event.request.url.startsWith('chrome-extension://')) return response;
                  const responseToCache = response.clone();
                  caches.open(CACHE_NAME).then((cache) => {
                    cache.put(event.request, responseToCache);
                  });
                  return response;
                }).catch(() => {
                  if (event.request.mode === 'navigate') {
                    return caches.match('/index.html');
                  }
                });
              })
            );
          });
          ENDOFFILE

          # Copy and modify index.html
          cp index.html www/index.html
          
          # Inject manifest
          sed -i 's|<head>|<head>\n    <link rel="manifest" href="manifest.json">\n    <meta name="theme-color" content="#667eea">|' www/index.html
          
          # Inject service worker
          sed -i 's|</body>|<script>if("serviceWorker"in navigator){window.addEventListener("load",function(){navigator.serviceWorker.register("service-worker.js").then(function(r){console.log("[PWA] SW registered")}).catch(function(e){console.log("[PWA] SW failed:",e)})});}</script></body>|' www/index.html
          
          echo "www directory prepared"
          ls -la www/

      - name: Create capacitor.config.json
        run: |
          cat > capacitor.config.json << 'ENDOFFILE'
          {
            "appId": "com.notaservicehp.app",
            "appName": "Nota Service HP",
            "webDir": "www",
            "bundledWebRuntime": false,
            "server": {
              "androidScheme": "https",
              "cleartext": true
            },
            "plugins": {
              "Camera": {
                "presentationStyle": "fullscreen"
              },
              "Contacts": {
                "permissionRead": "Aplikasi memerlukan akses kontak untuk import data pelanggan"
              },
              "SplashScreen": {
                "launchShowDuration": 2000,
                "backgroundColor": "#667eea",
                "showSpinner": true,
                "spinnerColor": "#ffffff"
              },
              "StatusBar": {
                "style": "light",
                "backgroundColor": "#667eea"
              }
            },
            "android": {
              "buildOptions": {
                "keystorePath": null,
                "keystoreAlias": null
              }
            }
          }
          ENDOFFILE

      - name: Add Android Platform
        run: |
          rm -rf android
          npx cap add android 2>&1 | tee add.log
          if [ ! -d "android" ]; then
            echo "Failed to create android directory"
            cat add.log
            exit 1
          fi
          echo "Android platform created"

      - name: Inject Android Permissions
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          
          if [ ! -f "$MANIFEST" ]; then
            echo "AndroidManifest.xml not found"
            exit 1
          fi
          
          cp "$MANIFEST" "$MANIFEST.bak"
          
          # Remove old permissions
          sed -i '/uses-permission/d' "$MANIFEST"
          sed -i '/uses-feature/d' "$MANIFEST"
          
          # Remove closing manifest tag
          sed -i '/^<\/manifest>$/d' "$MANIFEST"
          
          # Add Camera permissions
          echo '' >> "$MANIFEST"
          echo '    <!-- Camera Plugin -->' >> "$MANIFEST"
          echo '    <uses-permission android:name="android.permission.CAMERA" />' >> "$MANIFEST"
          echo '    <uses-permission android:name="android.permission.READ_MEDIA_IMAGES" />' >> "$MANIFEST"
          echo '    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32" />' >> "$MANIFEST"
          echo '    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="29" />' >> "$MANIFEST"
          echo '    <uses-feature android:name="android.hardware.camera" android:required="false" />' >> "$MANIFEST"
          
          # Add Contacts permissions
          echo '' >> "$MANIFEST"
          echo '    <!-- Contacts Plugin -->' >> "$MANIFEST"
          echo '    <uses-permission android:name="android.permission.READ_CONTACTS" />' >> "$MANIFEST"
          echo '    <uses-permission android:name="android.permission.WRITE_CONTACTS" />' >> "$MANIFEST"
          echo '    <uses-permission android:name="android.permission.GET_ACCOUNTS" />' >> "$MANIFEST"
          
          # Add Bluetooth permissions
          echo '' >> "$MANIFEST"
          echo '    <!-- Bluetooth Plugin -->' >> "$MANIFEST"
          echo '    <uses-permission android:name="android.permission.BLUETOOTH" />' >> "$MANIFEST"
          echo '    <uses-permission android:name="android.permission.BLUETOOTH_ADMIN" />' >> "$MANIFEST"
          echo '    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />' >> "$MANIFEST"
          echo '    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />' >> "$MANIFEST"
          echo '    <uses-permission android:name="android.permission.BLUETOOTH_SCAN" />' >> "$MANIFEST"
          echo '    <uses-permission android:name="android.permission.BLUETOOTH_CONNECT" />' >> "$MANIFEST"
          
          # Close manifest
          echo '' >> "$MANIFEST"
          echo '</manifest>' >> "$MANIFEST"
          
          echo "Permissions injected"

      - name: Sync Capacitor
        run: |
          npx cap sync android 2>&1 | tee sync.log
          if grep -qi "error" sync.log; then
            echo "Sync failed"
            cat sync.log
            exit 1
          fi
          echo "Sync completed"

      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean assembleDebug --no-daemon --stacktrace 2>&1 | tee build.log

      - name: Verify APK
        run: |
          APK_PATH="android/app/build/outputs/apk/debug/app-debug.apk"
          if [ -f "$APK_PATH" ]; then
            echo "APK built successfully"
            ls -lh "$APK_PATH"
            SIZE_BYTES=$(stat -c%s "$APK_PATH")
            echo "size_bytes=$SIZE_BYTES" >> $GITHUB_ENV
          else
            echo "APK not found"
            exit 1
          fi

      - name: Upload APK Latest
        uses: actions/upload-artifact@v4
        with:
          name: nota-service-hp-latest
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload APK Versioned
        uses: actions/upload-artifact@v4
        with:
          name: nota-service-hp-build-${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 90

      - name: Build Summary
        run: |
          SIZE_MB=$((${{ env.size_bytes }} / 1024 / 1024))
          echo "## Build Success! (Capacitor 6)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Detail | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Build Number | ${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Capacitor | 6.1.2 |" >> $GITHUB_STEP_SUMMARY
          echo "| APK Size | ${SIZE_MB} MB |" >> $GITHUB_STEP_SUMMARY

      - name: Debug on Failure
        if: failure()
        run: |
          echo "=== package.json ==="
          cat package.json 2>/dev/null || echo "Not found"
          echo "=== Directory structure ==="
          ls -la
          if [ -d "android" ]; then
            echo "=== AndroidManifest.xml ==="
            cat android/app/src/main/AndroidManifest.xml 2>/dev/null || echo "Not found"
          fi
