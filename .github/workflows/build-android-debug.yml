name: 📱 Build Android Debug APK (Capacitor 6)

on:
  workflow_dispatch:
    inputs:
      build_notes:
        description: '📝 Catatan build'
        required: false
        type: string
        default: 'Build Capacitor 6'
  
  push:
    branches: [main, master]

jobs:
  build-android-debug:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: ⚙️ Setup Gradle
        run: |
          mkdir -p ~/.gradle
          echo "org.gradle.jvmargs=-Xmx4096m -Dfile.encoding=UTF-8" >> ~/.gradle/gradle.properties
          echo "org.gradle.daemon=false" >> ~/.gradle/gradle.properties
          echo "org.gradle.parallel=true" >> ~/.gradle/gradle.properties

      # ==========================================
      # STEP 1: Create package.json (Capacitor 6)
      # ==========================================
      - name: 📝 Create package.json
        run: |
          cat > package.json << 'EOF'
          {
            "name": "nota-service-hp",
            "version": "1.0.0",
            "description": "Nota Service HP - Capacitor 6",
            "main": "index.html",
            "scripts": {
              "build": "mkdir -p www && cp index.html www/index.html",
              "cap:sync": "npx cap sync android",
              "build:debug": "npm run build && npx cap sync android && cd android && ./gradlew assembleDebug"
            },
            "dependencies": {
              "@capacitor/android": "^6.1.2",
              "@capacitor/core": "^6.1.2",
              "@capacitor/camera": "^6.0.2",
              "@capacitor/filesystem": "^6.0.1",
              "@capacitor/share": "^6.0.2",
              "@capacitor/splash-screen": "^6.0.3",
              "@capacitor/status-bar": "^6.0.1",
              "@capacitor-community/contacts": "^6.0.0",
              "@capacitor-community/bluetooth-le": "^6.0.0"
            },
            "devDependencies": {
              "@capacitor/cli": "^6.1.2"
            }
          }
          EOF
          
          cat package.json

      # ==========================================
      # STEP 2: Install dependencies
      # ==========================================
      - name: 📦 Install dependencies
        run: |
          npm install
          npm install -g @capacitor/cli@^6.1.2

      # ==========================================
      # STEP 3: Prepare www directory + PWA Files
      # ==========================================
      - name: 🏗️ Prepare www directory & PWA Assets
        run: |
          mkdir -p www
          
          # ✅ Cek index.html di ROOT (bukan src/)
          if [ -f "index.html" ]; then
            echo "✅ index.html found in root"
          else
            echo "❌ index.html not found in root directory!"
            echo "=== Current directory structure ==="
            ls -la
            exit 1
          fi

          # ==========================================
          # 📝 AUTO-GENERATE MANIFEST.JSON
          # ==========================================
          cat > www/manifest.json << 'EOF'
          {
            "name": "Nota Service HP - Professional",
            "short_name": "ServiceHP",
            "description": "Sistem Manajemen Service HP Profesional",
            "start_url": "/",
            "display": "standalone",
            "background_color": "#667eea",
            "theme_color": "#667eea",
            "orientation": "portrait",
            "scope": "/",
            "categories": ["business", "productivity"],
            "icons": [
              {
                "src": "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect fill='%23667eea' width='192' height='192'/%3E%3Ctext x='50%25' y='50%25' dominant-baseline='middle' text-anchor='middle' font-size='100'%3E📱%3C/text%3E%3C/svg%3E",
                "sizes": "192x192",
                "type": "image/svg+xml",
                "purpose": "any maskable"
              },
              {
                "src": "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect fill='%23667eea' width='512' height='512'/%3E%3Ctext x='50%25' y='50%25' dominant-baseline='middle' text-anchor='middle' font-size='250'%3E📱%3C/text%3E%3C/svg%3E",
                "sizes": "512x512",
                "type": "image/svg+xml",
                "purpose": "any maskable"
              }
            ]
          }
          EOF
          echo "✅ manifest.json created in www/"

          # ==========================================
          # 📝 AUTO-GENERATE SERVICE WORKER
          # ==========================================
          cat > www/service-worker.js << 'EOF'
          const CACHE_NAME = 'nota-service-hp-v1';
          const STATIC_ASSETS = ['/', '/index.html'];

          self.addEventListener('install', (event) => {
            console.log('[SW] Installing Service Worker...');
            event.waitUntil(
              caches.open(CACHE_NAME).then((cache) => {
                console.log('[SW] Caching static assets');
                return cache.addAll(STATIC_ASSETS);
              }).then(() => self.skipWaiting())
            );
          });

          self.addEventListener('activate', (event) => {
            console.log('[SW] Activating Service Worker...');
            event.waitUntil(
              caches.keys().then((cacheNames) => {
                return Promise.all(
                  cacheNames.map((cacheName) => {
                    if (cacheName !== CACHE_NAME) {
                      console.log('[SW] Deleting old cache:', cacheName);
                      return caches.delete(cacheName);
                    }
                  })
                );
              }).then(() => self.clients.claim())
            );
          });

          self.addEventListener('fetch', (event) => {
            event.respondWith(
              caches.match(event.request).then((cached) => {
                if (cached) {
                  return cached;
                }
                return fetch(event.request).then((response) => {
                  if (!response || response.status !== 200 || event.request.method !== 'GET') {
                    return response;
                  }
                  if (event.request.url.startsWith('chrome-extension://')) {
                    return response;
                  }
                  const responseToCache = response.clone();
                  caches.open(CACHE_NAME).then((cache) => {
                    cache.put(event.request, responseToCache);
                  });
                  return response;
                }).catch((error) => {
                  console.log('[SW] Fetch failed:', error);
                  if (event.request.mode === 'navigate') {
                    return caches.match('/index.html');
                  }
                });
              })
            );
          });
          EOF
          echo "✅ service-worker.js created in www/"

          # ==========================================
          # 📄 COPY & MODIFY INDEX.HTML (dari root ke www/)
          # ==========================================
          cp index.html www/index.html
          echo "✅ Copied index.html from root to www/"
          
          # Inject manifest link setelah <head> tag
          sed -i 's|<head>|<head>\n    <link rel="manifest" href="manifest.json">\n    <meta name="theme-color" content="#667eea">|' www/index.html
          
          # Inject service worker registration sebelum </body>
          sed -i 's|</body>|<script>\n      if ("serviceWorker" in navigator) {\n        window.addEventListener("load", () => {\n          navigator.serviceWorker.register("service-worker.js")\n            .then(reg => console.log("[PWA] Service Worker registered"))\n            .catch(err => console.log("[PWA] Service Worker registration failed:", err));\n        });\n      }\n    </script>\n  </body>|' www/index.html
          
          echo "✅ Injected manifest and service worker to www/index.html"
          echo "=== www directory contents ==="
          ls -la www/

      # ==========================================
      # STEP 4: Create capacitor.config.json
      # ==========================================
      - name: 🔧 Create capacitor.config.json
        run: |
          cat > capacitor.config.json << 'EOF'
          {
            "appId": "com.notaservicehp.app",
            "appName": "Nota Service HP",
            "webDir": "www",
            "server": {
              "androidScheme": "https",
              "cleartext": true
            },
            "plugins": {
              "Camera": {
                "presentationStyle": "fullscreen",
                "promptLabelHeader": "Akses Kamera",
                "promptLabelCancel": "Batal",
                "promptLabelPhoto": "Ambil Foto",
                "promptLabelPicture": "Dari Galeri"
              },
              "SplashScreen": {
                "launchShowDuration": 2000,
                "backgroundColor": "#667eea",
                "showSpinner": true,
                "spinnerColor": "#ffffff"
              },
              "StatusBar": {
                "style": "light",
                "backgroundColor": "#667eea"
              }
            },
            "android": {
              "buildOptions": {
                "keystorePath": null,
                "keystoreAlias": null
              }
            }
          }
          EOF
          
          cat capacitor.config.json

      # ==========================================
      # STEP 5: Add Android Platform
      # ==========================================
      - name: 🤖 Add Android Platform
        run: |
          rm -rf android
          
          npx cap add android 2>&1 | tee add.log
          
          if [ ! -d "android" ]; then
            echo "❌ Failed to create android directory"
            cat add.log
            exit 1
          fi
          
          echo "✅ Android platform created"
          ls -la android/

      # ==========================================
      # STEP 6: 🔐 Inject Android Permissions (Camera, Contacts, Bluetooth, Storage)
      # ==========================================
      - name: 🔐 Inject Android Permissions
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          
          if [ ! -f "$MANIFEST" ]; then
            echo "❌ AndroidManifest.xml not found"
            find android -name "AndroidManifest.xml"
            exit 1
          fi
          
          echo "✅ Found AndroidManifest.xml"
          cp "$MANIFEST" "$MANIFEST.bak"
          
          # Hapus permission lama jika ada (untuk idempotency)
          sed -i '/uses-permission/d' "$MANIFEST"
          sed -i '/uses-feature/d' "$MANIFEST"
          sed -i '/<!-- Plugin/d' "$MANIFEST"
          
          # Hapus </manifest> terakhir
          sed -i '/^<\/manifest>$/d' "$MANIFEST"
          
          # Inject SEMUA permission yang diperlukan
          cat >> "$MANIFEST" << 'EOF'

    <!-- 📷 Camera Plugin (@capacitor/camera) -->
    <uses-permission android:name="android.permission.CAMERA" />
    <uses-permission android:name="android.permission.READ_MEDIA_IMAGES" />
    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32" />
    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="29" />
    <uses-feature android:name="android.hardware.camera" android:required="false" />

    <!-- 📇 Contacts Plugin (@capacitor-community/contacts) -->
    <uses-permission android:name="android.permission.READ_CONTACTS" />
    <uses-permission android:name="android.permission.WRITE_CONTACTS" />

    <!-- 📡 Bluetooth Plugin (@capacitor-community/bluetooth-le) -->
    <uses-permission android:name="android.permission.BLUETOOTH" />
    <uses-permission android:name="android.permission.BLUETOOTH_ADMIN" />
    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />
    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />
    <uses-permission android:name="android.permission.BLUETOOTH_SCAN" />
    <uses-permission android:name="android.permission.BLUETOOTH_CONNECT" />

</manifest>
EOF
          
          echo "✅ All permissions injected:"
          cat "$MANIFEST"

      # ==========================================
      # STEP 7: Sync Capacitor
      # ==========================================
      - name: 🔄 Sync Capacitor
        run: |
          npx cap sync android 2>&1 | tee sync.log
          
          if grep -qi "error" sync.log; then
            echo "❌ Sync failed"
            cat sync.log
            exit 1
          fi
          
          echo "✅ Sync completed"

      # ==========================================
      # STEP 8: Build APK
      # ==========================================
      - name: 🔨 Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean assembleDebug --no-daemon --stacktrace 2>&1 | tee build.log

      # ==========================================
      # STEP 9: Verify APK
      # ==========================================
      - name: 🔍 Verify APK
        run: |
          APK_PATH="android/app/build/outputs/apk/debug/app-debug.apk"
          
          if [ -f "$APK_PATH" ]; then
            echo "✅ APK built successfully"
            ls -lh "$APK_PATH"
            SIZE_BYTES=$(stat -c%s "$APK_PATH")
            echo "size_bytes=$SIZE_BYTES" >> $GITHUB_ENV
            echo "size_mb=$((SIZE_BYTES / 1024 / 1024)) MB"
          else
            echo "❌ APK not found"
            echo "=== Available files ==="
            find android -name "*.apk" 2>/dev/null || echo "No APK found"
            exit 1
          fi

      # ==========================================
      # STEP 10: Upload APK
      # ==========================================
      - name: 📤 Upload APK (Latest)
        uses: actions/upload-artifact@v4
        with:
          name: nota-service-hp-latest
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: 📤 Upload APK (Versioned)
        uses: actions/upload-artifact@v4
        with:
          name: nota-service-hp-build-${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 90

      # ==========================================
      # STEP 11: Build Summary
      # ==========================================
      - name: 📝 Build Summary
        run: |
          SIZE_MB=$((${{ env.size_bytes }} / 1024 / 1024))
          echo "## ✅ Build Success! (Capacitor 6)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Detail | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🔢 Build Number | ${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📦 Capacitor | 6.1.2 |" >> $GITHUB_STEP_SUMMARY
          echo "| 📷 Kamera | ✅ CAMERA + STORAGE |" >> $GITHUB_STEP_SUMMARY
          echo "| 📇 Kontak | ✅ READ/WRITE_CONTACTS |" >> $GITHUB_STEP_SUMMARY
          echo "| 📡 Bluetooth | ✅ BLUETOOTH + LOCATION |" >> $GITHUB_STEP_SUMMARY
          echo "| 📱 PWA | ✅ Manifest + Service Worker |" >> $GITHUB_STEP_SUMMARY
          echo "| 📦 APK Size | ${SIZE_MB} MB |" >> $GITHUB_STEP_SUMMARY
          echo "| ⬇️ Download | Artifacts di atas |" >> $GITHUB_STEP_SUMMARY

      # ==========================================
      # DEBUG: On Failure
      # ==========================================
      - name: 📋 Debug on Failure
        if: failure()
        run: |
          echo "=== package.json ==="
          cat package.json
          echo "=== capacitor.config.json ==="
          cat capacitor.config.json
          echo "=== Directory structure ==="
          ls -la
          if [ -d "www" ]; then
            echo "=== www/ contents ==="
            ls -la www/
          fi
          if [ -d "android" ]; then
            echo "=== AndroidManifest.xml ==="
            cat android/app/src/main/AndroidManifest.xml 2>/dev/null || echo "Not found"
            echo "=== Build log (last 50 lines) ==="
            cat android/build.log 2>/dev/null | tail -50 || echo "No build log"
          fi
